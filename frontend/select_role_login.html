<!DOCTYPE html>
<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Swifty - Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,typography,container-queries"></script>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#000000",
                        "background-light": "#FFF1F5",
                        "background-dark": "#0A0A0B",
                        "brand-pink": "#E11D48",
                    },
                    fontFamily: {
                        display: ["Inter", "sans-serif"],
                    },
                    borderRadius: {
                        DEFAULT: "12px",
                    },
                },
            },
        };
        function toggleDarkMode() {
            document.documentElement.classList.toggle('dark');
        }
    </script>
<style type="text/tailwindcss">
        .dot-pattern {
            background-image: radial-gradient(#e5e7eb 1px, transparent 1px);
            background-size: 20px 20px;
        }
        .dark .dot-pattern {
            background-image: radial-gradient(#1f2937 1px, transparent 1px);
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .swifty-logo {
            font-weight: 800;
            letter-spacing: -0.02em;
        }
    </style>
</head>
<body class="font-display bg-background-light dark:bg-background-dark min-h-screen transition-colors duration-200">
<header class="fixed top-0 left-0 right-0 h-16 bg-[#0E1116] dark:bg-[#050505] flex items-center justify-between px-6 z-50">
<div class="flex items-center">
<span class="text-white swifty-logo text-xl">SWIFTY</span>
</div>
<div class="flex items-center space-x-6 text-gray-300">
<a id="poop"class="flex items-center space-x-2 text-sm hover:text-white transition-colors" >
<span class="material-symbols-outlined text-[18px]">calendar_month</span>
<span  class="font-medium">Back to Calendar</span>
</a>

</div>
</header>
<main class="relative pt-16 min-h-screen flex items-center justify-center overflow-hidden">
<div class="absolute inset-0 dot-pattern opacity-50"></div>
<div class="relative w-full max-w-[480px] p-4 md:p-8">
<div class="bg-white dark:bg-[#151921] rounded-[32px] shadow-2xl shadow-pink-200/50 dark:shadow-none p-10 md:p-14 border-2 border-gray-100 dark:border-gray-800">
<div class="flex flex-col items-center text-center">
<div class="w-16 h-16 bg-pink-50 dark:bg-pink-900/20 rounded-2xl flex items-center justify-center mb-8">
<span class="material-symbols-outlined text-brand-pink text-3xl">lock</span>
</div>
<h1 class="text-3xl font-bold text-gray-900 dark:text-white mb-2">Login</h1>
<p class="text-gray-500 dark:text-gray-400 text-base mb-10">Select your role to access the portal</p>
<div class="w-full space-y-6">
<div class="text-left">
<label class="text-[11px] font-bold text-gray-500 dark:text-gray-400 uppercase tracking-widest mb-2 block px-1">
                                CONTINUE AS
                            </label>
<div class="relative">
<select id="roleDrop"class="w-full h-14 bg-gray-50 dark:bg-[#1C222C] border-none rounded-2xl px-6 appearance-none text-gray-700 dark:text-gray-200 focus:ring-2 focus:ring-gray-200 dark:focus:ring-gray-700 cursor-pointer">
<option disabled="" selected="" value="">Select Role</option>
<option value="club-coordinator">Club Coordinator</option>
<option value="authority">Faculty Advisor</option>
<option value="authority">Student Gymkhana President</option>
<option value="authority">General Secretary</option>
<option value="authority">DOSA Office</option>
</select>
<div class="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-gray-400 flex flex-col -space-y-1">
<span class="material-symbols-outlined text-[14px]">expand_less</span>
<span class="material-symbols-outlined text-[14px]">expand_more</span>
</div>
</div>
</div>
<button id="enter"class="w-full h-14 bg-primary hover:bg-brand-pink text-white rounded-2xl font-bold flex items-center justify-center space-x-2 transition-all duration-300 active:scale-[0.98] shadow-lg shadow-black/10">
<span>Enter</span>
<span class="material-symbols-outlined text-xl">arrow_forward</span>
</button>
</div>

</div>
</div>
</div>
</main>
<div class="fixed bottom-0 left-0 w-full h-1/2 bg-gradient-to-t from-pink-100/30 dark:from-pink-900/5 to-transparent pointer-events-none z-0"></div>

</body>
<script>
    const backButton= document.getElementById("poop");
    const enter= document.getElementById("enter");
    
    if(backButton){
        backButton.addEventListener("click",function(){
            window.location.href="publiccalender.html";
        });
    }
    if(enter){
        enter.addEventListener("click",function(){
            const clubDrop=document.getElementById("roleDrop");
            if(clubDrop){
                if(clubDrop.value=="club-coordinator"){
                    window.location.href="coordinator_login.html";
                }
                else if(clubDrop.value=="authority"){
                    window.location.href="authority_login.html";
                }
            }
        })
    }
</script>
</html>
