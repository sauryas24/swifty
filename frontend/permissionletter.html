<!DOCTYPE html>
<html class="light" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>New Permission Letter Form - Music Club</title>
<script src="config.js"></script>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>

<script>
    tailwind.config = {
        darkMode: "class",
        theme: {
            extend: {
                colors: {
                    primary: "#db2777", // Swifty Pink
                    "baby-pink": "#fdf2f8", // Original Background
                },
                fontFamily: {
                    sans: ["Inter", "sans-serif"],
                },
            },
        },
    };
</script>
<style>
        body { font-family: 'Inter', sans-serif; }
        
        /* Handles the smooth transition of the sidebar sliding in and out on mobile screens. */
        #sidebar { transition: transform 0.3s ease-in-out; }
        .sidebar-closed { transform: translateX(-100%); }
        .sidebar-open { transform: translateX(0); }
        
        @media (min-width: 768px) {
            .sidebar-closed { margin-left: -280px; transform: none; }
            .sidebar-open { margin-left: 0; transform: none; }
        }

        /* Expands the hit area for native date and time pickers to cover the entire input field seamlessly. */
        input[type="date"]::-webkit-calendar-picker-indicator,
        input[type="time"]::-webkit-calendar-picker-indicator {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
            z-index: 20;
        }
    </style>
</head>
<body class="bg-[#fdf2f8] text-slate-900 min-h-screen transition-colors duration-200">

<header class="fixed top-0 left-0 right-0 h-20 bg-slate-900 text-white flex items-center px-6 z-[60] shadow-md border-b border-pink-900/20">
    <button id="menuBtn" class="p-2 mr-4 hover:bg-slate-800 rounded-lg cursor-pointer transition-colors">
        <span class="material-icons-round text-2xl">menu</span>
    </button>
    <div class="flex items-center gap-4">
        <img src="swifty_logo.png" alt="Swifty Logo" class="h-16 object-contain drop-shadow-sm" />
        <span class="h-6 w-px bg-slate-700"></span>
        <span id="header-role-badge" class="text-lg text-pink-400 font-black uppercase tracking-wider bg-slate-800/80 px-4 py-1.5 rounded-lg shadow-inner">COORDINATOR</span>
    </div>
    <button id="logoutBtn" class="ml-auto flex items-center gap-2 bg-slate-800 hover:bg-slate-700 text-white rounded-lg px-4 py-2.5 text-sm font-semibold transition-colors shadow-sm">
        <span class="material-symbols-outlined text-[20px]">logout</span>
        <span>Logout</span>
    </button>
</header>

<div class="flex h-screen pt-20">
    
    <aside id="sidebar" class="sidebar-open fixed md:static inset-y-0 left-0 w-[260px] bg-white border-r border-pink-100 flex flex-col justify-between shrink-0 h-full overflow-y-auto z-50 transition-all duration-300 shadow-sm">
        <div class="flex flex-col gap-6">
            <nav class="flex-1 px-4 py-4 space-y-1">
                <a id="dashboard"class="flex items-center gap-3 px-4 py-3 text-slate-600 dark:text-slate-400 hover:bg-pink-50 dark:hover:bg-pink-900/10 rounded-xl transition-colors mt-2" href="#">
                    <span class="material-icons-round text-xl">dashboard</span>
                    <span class="text-sm">Dashboard</span>
                    </a>
                <a class="finances flex items-center gap-3 px-4 py-3 text-slate-600 dark:text-slate-400 hover:bg-pink-50 dark:hover:bg-pink-900/10 rounded-xl transition-colors mt-2" href="#">
                    <span class="material-icons-round text-xl">account_balance_wallet</span>
                    <span class="text-sm">Finances</span>
                    </a>
                <a class="permission_letter flex items-center gap-3 px-4 py-3 text-slate-600 dark:text-slate-400 hover:bg-pink-50 dark:hover:bg-pink-900/10 rounded-xl transition-colors mt-2" href="#">
                    <span class="material-icons-round text-xl">description</span>
                    <span class="text-sm">Permission Letter</span>
                    </a>
                <a class="MOU_form flex items-center gap-3 px-4 py-3 text-slate-600 dark:text-slate-400 hover:bg-pink-50 dark:hover:bg-pink-900/10 rounded-xl transition-colors mt-2" href="#">
                    <span class="material-icons-round text-xl">assignment</span>
                    <span class="text-sm">MOU Form</span>
                    </a>
                <a class="venue_booking flex items-center gap-3 px-4 py-3 text-slate-600 dark:text-slate-400 hover:bg-pink-50 dark:hover:bg-pink-900/10 rounded-xl transition-colors mt-2" href="#">
                <span class="material-icons-round text-xl">event_seat</span>
                <span class="text-sm">Venue Booking</span>
                </a>
                <a class="past_requests flex items-center gap-3 px-4 py-3 text-slate-600 dark:text-slate-400 hover:bg-pink-50 dark:hover:bg-pink-900/10 rounded-xl transition-colors" href="#">
                <span class="material-icons-round text-xl">history</span>
                <span class="text-sm">Past Requests</span>
                </a>
                </nav>
        </div>
        <div class="p-4 border-t border-[#e5dce0] dark:border-gray-800"></div>
    </aside>

    <div id="sidebarOverlay" class="fixed inset-0 bg-black/50 z-40 hidden md:hidden"></div>

    <main class="flex-1 flex flex-col h-full overflow-y-auto relative bg-[#fdf2f8] text-slate-900">
        
        
        <div class="flex-1 px-4 md:px-10 lg:px-16 py-10 flex justify-center">
            <div class="w-full max-w-[960px] flex flex-col gap-6">
                
                <div class="bg-white dark:bg-[#2a1721] rounded-2xl p-6 md:p-10 shadow-sm border border-pink-100 dark:border-gray-800">
                    <div class="mb-8 text-center border-b border-pink-50 dark:border-gray-800 pb-6">
                        <h2 class="text-slate-900 dark:text-white tracking-tight text-[28px] font-bold leading-tight">Permission Letter Form</h2>
                        <p class="text-slate-500 dark:text-gray-400 mt-2 text-sm">Submit a new request for an upcoming club event</p>
                    </div>
                    
                    <form class="flex flex-col gap-6">
                        <div class="flex flex-col w-full gap-2">
                            <label class="text-slate-900 dark:text-gray-200 text-sm font-medium">Name of Event</label>
                            <input id="eventName" class="w-full rounded-xl text-slate-900 dark:text-white border border-pink-200 dark:border-gray-700 bg-white dark:bg-transparent h-14 px-4 text-base font-normal focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all placeholder:text-slate-400 dark:placeholder:text-gray-600" placeholder="e.g., Annual Musical Showcase" type="text"/>
                        </div>
                        
                        <div class="flex flex-col md:flex-row gap-6 w-full">
                            <label class="flex flex-col flex-1 gap-2 relative">
                                <span class="text-slate-900 dark:text-gray-200 text-sm font-medium">Date</span>
                                <div class="relative">
                                    <input id="eventDate"class="w-full rounded-xl text-slate-900 dark:text-white border border-pink-200 dark:border-gray-700 bg-white dark:bg-transparent h-14 px-4 text-base font-normal focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all placeholder:text-slate-400 dark:[color-scheme:dark]" type="date"/>
                                    <span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none">calendar_month</span>
                                </div>
                            </label>
                            <label class="flex flex-col flex-1 gap-2 relative">
                                <span class="text-slate-900 dark:text-gray-200 text-sm font-medium">Time</span>
                                <div class="relative">
                                    <input id="eventTime"class="w-full rounded-xl text-slate-900 dark:text-white border border-pink-200 dark:border-gray-700 bg-white dark:bg-transparent h-14 px-4 text-base font-normal focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all placeholder:text-slate-400 dark:[color-scheme:dark]" type="time"/>
                                    <span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none">schedule</span>
                                </div>
                            </label>
                        </div>

                        <div class="flex flex-col w-full gap-2">
                            <label class="text-slate-900 dark:text-gray-200 text-sm font-medium">Reason to Conduct Event</label>
                            <textarea id="reason" class="w-full rounded-xl text-slate-900 dark:text-white border border-pink-200 dark:border-gray-700 bg-white dark:bg-transparent min-h-[140px] p-4 text-base font-normal focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all placeholder:text-slate-400 dark:placeholder:text-gray-600 resize-none" placeholder="Describe the purpose, expected audience, and details..."></textarea>
                        </div>
                        
                        <div class="pt-4 flex justify-end gap-3">
                            <button type="reset" id="cancelButton" class="h-12 px-6 rounded-xl bg-transparent hover:bg-gray-100 dark:hover:bg-white/5 text-slate-500 dark:text-gray-300 font-medium transition-colors" type="button">
                                Cancel
                            </button>
                            <button id="submitButton" class="h-12 px-8 rounded-xl bg-primary hover:bg-primary/90 text-white font-bold shadow-lg shadow-primary/20 transition-all flex items-center gap-2" type="button">
                                <span>Submit Request</span>
                                <span class="material-symbols-outlined text-lg">send</span>
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>
</div>

<script>
    const menuBtn = document.getElementById('menuBtn');
    const sidebar = document.getElementById('sidebar');
    const sidebarOverlay = document.getElementById('sidebarOverlay');
    
    // Manages the visual state of the sidebar between mobile overlay and desktop docked modes.
    function toggleSidebar() {
        if (window.innerWidth < 768) {
            sidebar.classList.toggle('sidebar-closed'); 
            sidebar.classList.toggle('sidebar-open');
            sidebarOverlay.classList.toggle('hidden');
        } else {
            sidebar.classList.toggle('sidebar-closed');
            sidebar.classList.toggle('sidebar-open');
        }
    }

    menuBtn.addEventListener('click', toggleSidebar);
    sidebarOverlay.addEventListener('click', toggleSidebar);

    // Binds navigation events to the sidebar links to manage internal application routing.
    const finances = document.querySelectorAll(".finances");
    const permission_letter= document.querySelectorAll(".permission_letter");
    const MOU_form= document.querySelectorAll(".MOU_form");
    const venue_booking= document.querySelectorAll(".venue_booking");
    const past_requests=document.querySelectorAll(".past_requests");
    const dashboard= document.getElementById("dashboard");
    
    if(dashboard){
        dashboard.addEventListener("click", function(){
            window.location.href= "Coordinator_homepage.html";
        });
    }
    
    finances.forEach(button => button.addEventListener("click", (event) => {
        event.preventDefault(); 
        window.location.href = "Finances.html";
    }));
    
    MOU_form.forEach(button => button.addEventListener("click", (event) => {
        event.preventDefault(); 
        window.location.href = "Mou.html";
    }));
    
    venue_booking.forEach(button => button.addEventListener("click", (event) => {
        event.preventDefault(); 
        window.location.href = "Venue_booking.html";
    }));
    
    permission_letter.forEach(button => button.addEventListener("click", (event) => {
        event.preventDefault(); 
        window.location.href = "permissionletter.html";
    }));

    past_requests.forEach(button => button.addEventListener("click", (event) => {
        event.preventDefault(); 
        window.location.href = "past requests.html";
    }));
    
    // Reads contextual information from local storage to personalize the UI header.
    const clubName = document.getElementById("clubName");
    const enterName = localStorage.getItem("club");
    if(clubName){
        clubName.textContent= enterName.toUpperCase();
    }

    const submitButton = document.getElementById("submitButton");
    
    // Intercepts the form action to transmit data asynchronously and securely to the backend endpoint.
    if(submitButton){
        submitButton.addEventListener("click", async(event) => {
            event.preventDefault(); 
            
            const eventName = document.getElementById("eventName").value;
            const eventDate = document.getElementById("eventDate").value;
            const eventTime = document.getElementById("eventTime").value;
            const reason = document.getElementById("reason").value;
            
            // Verifies active authentication status prior to network requests.
            const freshToken = localStorage.getItem("token");
            
            if (!freshToken) {
                alert("Security Error: No token found. Please log in again.");
                return;
            }

            const PermissionLetter = {
                event_name: eventName,
                date: eventDate,
                time: eventTime,
                reason: reason
            };

            try {
                const response = await fetch(`${API_BASE_URL}/api/permission/submit`, {
                    method: "POST",
                    headers: { 
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${freshToken}` 
                    },
                    body: JSON.stringify(PermissionLetter)
                });

                if (response.ok) {
                    alert("Permission letter sent successfully!");
                    document.getElementById("eventName").value = "";
                    document.getElementById("eventDate").value = "";
                    document.getElementById("eventTime").value = "";
                    document.getElementById("reason").value = "";
                } else {
                    const errorData = await response.json();
                    alert(`Submission Failed: ${errorData.detail}`);
                }
            } catch(e) {
                console.error("Fetch failed entirely:", e);
            }
        });
    }
</script>
</body>
</html>
