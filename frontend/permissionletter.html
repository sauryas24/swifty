<!DOCTYPE html>
<html class="light" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>New Permission Letter Form - SWIFTY</title>
<script src="config.js"></script>
<script>
    // Immediate Authentication Check: Prevent access without a token
    if (!localStorage.getItem("token")) {
        // Replace current history state so the user can't use the "Back" button to bypass this
        window.location.replace("Select_role_login.html");
    }
</script>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>

<script>
    tailwind.config = {
        darkMode: "class",
        theme: {
            extend: {
                colors: {
                    primary: "#db2777", // Swifty Pink
                    "baby-pink": "#fdf2f8", // Original Background
                    "background-light": "#f8f6f7",
                    "background-dark": "#211119",
                    "text-main": "#171114",
                    "text-muted": "#876475",
                    "border-light": "#e5dce0",
                    "surface-dark": "#2d1b24",
                },
                fontFamily: {
                    sans: ["Inter", "sans-serif"],
                    display: ["Inter", "sans-serif"]
                },
                borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
            },
        },
    };
</script>
<style>
    :root {
            --bg-pink: #fdf2f8;
            --sidebar-width: 260px;
        }
        body {
            font-family: "Inter", sans-serif;
            background-color: var(--bg-pink);
        }
        
        /* Defines positioning for side navigation drawers to slide correctly when clicked. */
        .sidebar-drawer {
            transform: translateX(-100%);
            transition: transform 0.3s ease-in-out;
        }
        #sidebar-toggle:checked ~ .sidebar-drawer {
            transform: translateX(0);
        }
        #sidebar-toggle:checked ~ .main-content {
            margin-left: var(--sidebar-width);
        }
        .main-content {
            transition: margin-left 0.3s ease-in-out;
        }
        .watermark-bg {
    background: linear-gradient(135deg, #fce7f3 0%, #f8fafc 40%, #e2e8f0 75%, #cbd5e1 100%);
    background-attachment: fixed;
}
.dark .watermark-bg {
    background: linear-gradient(135deg, #1a1013 0%, #0f172a 45%, #1e293b 100%);
    background-attachment: fixed;
}
    /* Expands the hit area for native date and time pickers */
    input[type="date"]::-webkit-calendar-picker-indicator,
    input[type="time"]::-webkit-calendar-picker-indicator {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        opacity: 0;
        cursor: pointer;
        z-index: 20;
    }
</style>
</head>
<body class="bg-[#fdf2f8] text-slate-900 min-h-screen transition-colors duration-200 overflow-hidden">
<input checked class="hidden" id="sidebar-toggle" type="checkbox"/>
<header class="fixed top-0 left-0 right-0 h-16 bg-slate-900 text-white flex items-center px-6 z-[60] shadow-md border-b border-pink-900/20">
    <label id="menuBtn" class="p-2 mr-4 hover:bg-slate-800 rounded-lg cursor-pointer transition-colors" for="sidebar-toggle">
        <span class="material-icons-round text-2xl">menu</span>
    </label>
    <div class="flex items-center gap-4">
        <img src="swifty_logo.png" alt="Swifty Logo" class="h-16 object-contain drop-shadow-sm" />
        <span class="h-6 w-px bg-slate-700"></span>
        <span id="header-role-badge" class="text-lg text-pink-400 font-black uppercase tracking-wider bg-slate-800/80 px-4 py-1.5 rounded-lg shadow-inner">COORDINATOR</span>
    </div>
    <button id="logoutBtn" class="ml-auto flex items-center gap-2 bg-slate-800 hover:bg-slate-700 text-white rounded-lg px-4 py-2.5 text-sm font-semibold transition-colors shadow-sm">
        <span class="material-symbols-outlined text-[20px]">logout</span>
        <span>Logout</span>
    </button>
</header>

<div id="sidebar-container"></div>

<main class="main-content mt-16 min-h-screen overflow-y-auto p-4 md:p-8 relative watermark-bg">
        <div class="max-w-4xl mx-auto relative z-10">
            <div class="bg-white dark:bg-slate-900 rounded-2xl p-6 md:p-10 shadow-sm border border-pink-100 dark:border-pink-900/20">
                
                <div class="mb-8 text-center border-b border-pink-50 dark:border-gray-800 pb-6">
                    <h2 class="text-slate-900 dark:text-white tracking-tight text-[28px] font-bold leading-tight">Permission Letter Form</h2>
                    <p class="text-slate-500 dark:text-gray-400 mt-2 text-sm">Submit a new request for an upcoming club event</p>
                </div>
                
                <form id="permissionForm" class="flex flex-col gap-6">
                    <div class="flex flex-col w-full gap-2">
                        <label class="text-slate-900 dark:text-gray-200 text-sm font-medium">Event Title</label>
                        <input id="eventName" class="w-full rounded-xl text-slate-900 dark:text-white border border-pink-200 dark:border-gray-700 bg-white dark:bg-transparent h-14 px-4 text-base font-normal focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all placeholder:text-slate-400 dark:placeholder:text-gray-600" placeholder="Enter the name of your Event" type="text" required/>
                    </div>
                    
                    <div class="flex flex-col md:flex-row gap-6 w-full">
                        <label class="flex flex-col flex-1 gap-2 relative">
                            <span class="text-slate-900 dark:text-gray-200 text-sm font-medium">Date</span>
                            <div class="relative">
                                <input id="eventDate" class="w-full rounded-xl text-slate-900 dark:text-white border border-pink-200 dark:border-gray-700 bg-white dark:bg-transparent h-14 px-4 text-base font-normal focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all placeholder:text-slate-400" type="date" required/>
                                <span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none">calendar_month</span>
                            </div>
                        </label>
                        <label class="flex flex-col flex-1 gap-2 relative">
                            <span class="text-slate-900 dark:text-gray-200 text-sm font-medium">Time</span>
                            <div class="relative">
                                <input id="eventTime" class="w-full rounded-xl text-slate-900 dark:text-white border border-pink-200 dark:border-gray-700 bg-white dark:bg-transparent h-14 px-4 text-base font-normal focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all placeholder:text-slate-400" type="time" required/>
                                <span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none">schedule</span>
                            </div>
                        </label>
                    </div>

                    <div class="flex flex-col w-full gap-2">
                        <label class="text-slate-900 dark:text-gray-200 text-sm font-medium">Event Details & Purpose</label>
                        <textarea id="reason" class="w-full rounded-xl text-slate-900 dark:text-white border border-pink-200 dark:border-gray-700 bg-white dark:bg-transparent min-h-[140px] p-4 text-base font-normal focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all placeholder:text-slate-400 dark:placeholder:text-gray-600 resize-y" placeholder="Describe the purpose, expected audience and details..." required></textarea>
                    </div>
                    
                    <div class="pt-4 flex justify-end gap-3">
                        <button id="cancelButton" class="h-12 px-6 rounded-xl bg-transparent hover:bg-gray-100 dark:hover:bg-white/5 text-slate-500 dark:text-gray-300 font-medium transition-colors" type="button">
                            Cancel
                        </button>
                        <button id="submitButton" class="h-12 px-8 rounded-xl bg-primary hover:bg-primary/90 text-white font-bold shadow-lg shadow-primary/20 transition-all flex items-center gap-2" type="submit">
                            <span>Submit Request</span>
                            <span class="material-symbols-outlined text-lg">send</span>
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </main>
</div>

<script>
    // --- NAVIGATION LOGIC (Event Delegation to match MOU) ---
    document.body.addEventListener("click", function(event) {
        const target = event.target.closest('a, button, li'); 
        if (!target) return;
        if (target.id === "logoutBtn") {
            event.preventDefault();
            localStorage.clear();
            window.location.replace("Select_role_login.html"); // Ensure exact case matches your actual filename
            return;
        }

        if (target.classList.contains("finances")) { event.preventDefault(); window.location.href = "Finances.html"; }
        else if (target.classList.contains("MOU_form")) { event.preventDefault(); window.location.href = "Mou.html"; }
        else if (target.classList.contains("venue_booking")) { event.preventDefault(); window.location.href = "Venue_booking.html"; }
        else if (target.classList.contains("permission_letter")) { event.preventDefault(); window.location.href = "permissionletter.html"; }
        else if (target.classList.contains("past_requests")) { event.preventDefault(); window.location.href = "past requests.html"; }
        else if (target.id === "dashboard") { event.preventDefault(); window.location.href = "Coordinator_homepage.html"; }
    });
    
    // --- OPTIONAL UI LOGIC ---
    const clubName = document.getElementById("clubName");
    const enterName = localStorage.getItem("club");
    if(clubName && enterName){
        clubName.textContent = enterName.toUpperCase();
    }
    // --- PREVENT PAST DATES SELECTION ---
    const eventDateInput = document.getElementById("eventDate");
    if (eventDateInput) {
        // Get today's date formatted as YYYY-MM-DD
        const today = new Date().toISOString().split('T')[0];
        // Set the minimum allowed date to today
        eventDateInput.setAttribute('min', today);
    }
    // --- CANCEL BUTTON LOGIC ---
    const cancelButton = document.getElementById("cancelButton");
    if (cancelButton) {
        cancelButton.addEventListener('click', () => {
            document.getElementById("permissionForm").reset();
        });
    }

    // --- FORM SUBMISSION LOGIC ---
    const permissionForm = document.getElementById("permissionForm");
    
    if(permissionForm){
        permissionForm.addEventListener("submit", async(event) => {
            event.preventDefault(); 
            
            const eventName = document.getElementById("eventName").value;
            const eventDate = document.getElementById("eventDate").value;
            const eventTime = document.getElementById("eventTime").value;
            const reason = document.getElementById("reason").value;
            const submitBtn = document.getElementById("submitButton");
            
            const freshToken = localStorage.getItem("token");
            
            if (!freshToken) {
                alert("Security Error: No token found. Please log in again.");
                return;
            }

            const originalBtnHtml = submitBtn.innerHTML;
            submitBtn.disabled = true;
            submitBtn.innerHTML = `<span>Submitting...</span>`;

            const PermissionLetter = {
                event_name: eventName,
                date: eventDate,
                time: eventTime,
                reason: reason
            };

            try {
                const response = await fetch(`${API_BASE_URL}/api/permission/submit`, {
                    method: "POST",
                    headers: { 
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${freshToken}` 
                    },
                    body: JSON.stringify(PermissionLetter)
                });

                if (response.ok) {
                    alert("Permission letter sent successfully!");
                    permissionForm.reset();
                } else {
                    const errorData = await response.json();
                    alert(`Submission Failed: ${errorData.detail || "Unknown Error"}`);
                }
            } catch(e) {
                console.error("Fetch failed entirely:", e);
                alert("A network error occurred. Please try again.");
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = originalBtnHtml;
            }
        });
    }
</script>
<script src="components/sidebar.js"></script>
</body>
</html>
