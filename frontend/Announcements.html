<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Announcements - SWIFTY</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,typography,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#db2777",
                        "baby-pink": "#fdf2f8",
                        "accent-pink": "#fce7f3",
                        "background-dark": "#1a1013",
                        "swifty-blue": "#2563eb",
                        "swifty-purple": "#7c3aed",
                    },
                    fontFamily: {
                        display: ["Outfit", "Inter", "sans-serif"],
                        sans: ["Inter", "sans-serif"],
                    },
                    borderRadius: {
                        DEFAULT: "12px",
                    },
                },
            },
        };
    </script>
    <style type="text/tailwindcss">
        :root {
            --bg-pink: #fdf2f8;
            --sidebar-width: 280px;
        }
        body {
            font-family: "Inter", sans-serif;
            background-color: var(--bg-pink);
        }
        .sidebar-drawer {
            transform: translateX(-100%);
            transition: transform 0.3s ease-in-out;
        }
        #sidebar-toggle:checked ~ .sidebar-drawer {
            transform: translateX(0);
        }
        #sidebar-toggle:checked ~ .main-content {
            margin-left: var(--sidebar-width);
        }
        .main-content {
            transition: margin-left 0.3s ease-in-out;
        }
        .watermark-bg {
            background-image: linear-gradient(to bottom right, rgba(251, 231, 239, 0.6), rgba(253, 242, 248, 0.9));
        }
        .dark .watermark-bg {
            background-image: linear-gradient(to bottom right, rgba(26, 16, 19, 0.95), rgba(45, 27, 34, 0.9));
        }
        .nav-item-active {
            @apply bg-slate-100 dark:bg-slate-800 text-slate-900 dark:text-white font-semibold;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        details > summary {
            list-style: none;
        }
        details > summary::-webkit-details-marker {
            display: none;
        }
        details[open] summary .arrow-icon {
            transform: rotate(180deg);
        }
        .arrow-icon {
            transition: transform 0.2s ease-in-out;
        }
        /* Custom scrollbar for sidebar */
        aside::-webkit-scrollbar {
            width: 4px;
        }
        aside::-webkit-scrollbar-track {
            background: transparent;
        }
        aside::-webkit-scrollbar-thumb {
            background-color: rgba(219, 39, 119, 0.1);
            border-radius: 20px;
        }
    </style>
</head>
<body class="bg-baby-pink dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen transition-colors duration-200">
    
    <input checked="" class="hidden" id="sidebar-toggle" type="checkbox"/>
    
    <header class="fixed top-0 left-0 right-0 h-14 bg-slate-900 dark:bg-black text-white flex items-center px-4 z-[60] shadow-md border-b border-pink-900/20">
        <label class="p-2 mr-4 hover:bg-slate-800 rounded-lg cursor-pointer transition-colors" for="sidebar-toggle">
            <span class="material-icons-round">menu</span>
        </label>
        <div class="flex items-center gap-2">
            <span class="font-display font-bold text-xs md:text-sm tracking-widest uppercase">SWIFTY</span>
        </div>
    </header>

    <aside class="sidebar-drawer fixed left-0 top-14 h-[calc(100%-3.5rem)] w-[280px] bg-white dark:bg-slate-900 border-r border-pink-100 dark:border-pink-900/20 z-50 overflow-y-auto">
        <div class="flex flex-col h-full">
            <div class="p-6 border-b border-pink-50 dark:border-pink-900/10">
                <div class="flex flex-col">
                    <span class="font-display font-bold text-lg tracking-tight text-slate-900 dark:text-white">SWIFTY</span>
                </div>
            </div>
            <nav class="flex-1 px-4 py-4 space-y-1">
                <a id="dashboard"class="flex items-center gap-3 px-4 py-3 text-slate-600 dark:text-slate-400 hover:bg-pink-50 dark:hover:bg-pink-900/10 rounded-xl transition-colors mt-2" href="#">
                    <span class="material-icons-round text-xl">dashboard</span>
                    <span class="text-sm">Dashboard</span>
                    </a>
                
                <a class="finances flex items-center gap-3 px-4 py-3 text-slate-600 dark:text-slate-400 hover:bg-pink-50 dark:hover:bg-pink-900/10 rounded-xl transition-colors mt-2" href="#">
                    <span class="material-icons-round text-xl">account_balance_wallet</span>
                    <span class="text-sm">Finances</span>
                    </a>
                <a class="permission_letter flex items-center gap-3 px-4 py-3 text-slate-600 dark:text-slate-400 hover:bg-pink-50 dark:hover:bg-pink-900/10 rounded-xl transition-colors mt-2" href="#">
                    <span class="material-icons-round text-xl">description</span>
                    <span class="text-sm">Permission Letter</span>
                    </a>
                <a class="MOU_form flex items-center gap-3 px-4 py-3 text-slate-600 dark:text-slate-400 hover:bg-pink-50 dark:hover:bg-pink-900/10 rounded-xl transition-colors mt-2" href="#">
                    <span class="material-icons-round text-xl">assignment</span>
                    <span class="text-sm">MOU Form</span>
                    </a>
                <a class="venue_booking flex items-center gap-3 px-4 py-3 text-slate-600 dark:text-slate-400 hover:bg-pink-50 dark:hover:bg-pink-900/10 rounded-xl transition-colors mt-2" href="#">
                <span class="material-icons-round text-xl">event_seat</span>
                <span class="text-sm">Venue Booking</span>
                </a>
                <a class="past_requests flex items-center gap-3 px-4 py-3 text-slate-600 dark:text-slate-400 hover:bg-pink-50 dark:hover:bg-pink-900/10 rounded-xl transition-colors" href="#">
                <span class="material-icons-round text-xl">history</span>
                <span class="text-sm">Past Requests</span>
                </a>
                </nav>
            
        </div>
    </aside>

    <main class="main-content ml-0 mt-14 p-0 relative watermark-bg min-h-screen">
        
        <div class="bg-white dark:bg-slate-900 border-b border-pink-100 dark:border-pink-900/20 w-full px-8 py-6 mb-8 flex justify-between items-center relative z-10 shadow-sm">
            <div class="flex items-center gap-2 text-2xl font-display font-bold">
                <span id="clubName"class="text-slate-900 uppercase"></span>
                </div>
            
        </div>

        <div class="px-8 pb-20 max-w-6xl mx-auto relative z-10 space-y-6">
            
            

            <div class="bg-white dark:bg-slate-900 border border-pink-100 dark:border-pink-900/20 rounded-2xl p-4 shadow-sm flex flex-col md:flex-row gap-4 items-center justify-between">
                <div class="w-full md:w-1/2 relative">
                    <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">search</span>
                    <input class="w-full h-12 pl-12 pr-4 rounded-xl bg-pink-50/50 dark:bg-pink-900/10 border-transparent focus:border-pink-500 focus:bg-white dark:focus:bg-slate-800 focus:ring-0 text-slate-900 dark:text-white placeholder-slate-400 transition-all" placeholder="Search announcements..." type="text"/>
                </div>
                
            </div>

            <div id="insertAnnouncement" class="space-y-6">
                
                <div class="group bg-white dark:bg-slate-900 p-6 rounded-2xl border border-pink-100 dark:border-pink-900/20 shadow-sm hover:shadow-md transition-all cursor-pointer relative overflow-hidden">
                    Loading Announcements...
                </div>

                

                

            </div>
        </div>
    </main>
</body>
<script>
    const finances = document.querySelectorAll(".finances");
const permission_letter= document.querySelectorAll(".permission_letter");
const MOU_form= document.querySelectorAll(".MOU_form");
const venue_booking= document.querySelectorAll(".venue_booking");
const past_requests=document.querySelectorAll(".past_requests");
const dashboard= document.getElementById("dashboard");

if(dashboard){
    dashboard.addEventListener("click", function(){
        window.location.href= "Coordinator_homepage.html";
    });
}

finances.forEach((button) => {
button.addEventListener("click", function(event) {

    event.preventDefault(); 
    window.location.href = "Finances.html";
});
});
MOU_form.forEach((button) => {
button.addEventListener("click", function(event) {

    event.preventDefault(); 
    window.location.href = "Mou.html";
});
});
venue_booking.forEach((button) => {
button.addEventListener("click", function(event) {

    event.preventDefault(); 
    window.location.href = "Venue_booking.html";
});
});
permission_letter.forEach((button) => {
button.addEventListener("click", function(event) {

    event.preventDefault(); 
    window.location.href = "permissionletter.html";
});
});

past_requests.forEach((button) => {
button.addEventListener("click", function(event) {

    event.preventDefault(); 
    window.location.href = "past requests.html";
});
});
const clubName = document.getElementById("clubName");
const enterName = localStorage.getItem("club");
const getToken = localStorage.getItem("token");
if(clubName){
    clubName.textContent= enterName.toUpperCase();
}
async function loadAnnouncements() {
    try{
        const response = await fetch("http://127.0.0.1:8000/api/announcements/my-announements");
        const result = await response.json();
        const containerA = document.getElementById("insertAnnouncement");
        const enterName = localStorage.getItem("club");
        containerA.innerHTML="";
        result.forEach((event)=>{
            if(enterName in event.target_clubs){
            const cardHTML = `
                <div class="group bg-white dark:bg-slate-900 p-6 rounded-2xl border border-pink-100 dark:border-pink-900/20 shadow-sm hover:shadow-md transition-all cursor-pointer relative overflow-hidden">
                    <div class="absolute top-0 left-0 w-1 h-full bg-pink-500 opacity-0 group-hover:opacity-100 transition-opacity"></div>
                    <div class="flex flex-col md:flex-row gap-4 md:items-start justify-between mb-3">
                        <div class="flex items-center gap-3">

                            <h3 class="text-xl font-display font-bold text-slate-900 dark:text-white">End of Semester Jam Session</h3>
                        </div>
                        <span class="text-xs font-semibold text-slate-400 flex items-center gap-1 bg-pink-50/50 dark:bg-pink-900/10 px-3 py-1.5 rounded-lg">
                            <span class="material-symbols-outlined text-[16px]">schedule</span>
                            ${event.timestamp}
                        </span>
                    </div>
                    <p class="text-slate-600 dark:text-slate-300 leading-relaxed mb-6 text-sm">
                        ${event.message}
                    </p>
                    <div class="flex items-center justify-between border-t border-pink-50 dark:border-pink-900/10 pt-4">
                        <div class="flex items-center gap-3">
                            <div class="w-8 h-8 rounded-full bg-slate-200 dark:bg-slate-700 bg-cover bg-center" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuAPBLFw8DlYfvAB6bXLE7hcqaibKAUuG9HUUmwODC_UwpbNQZvsAeCzGyPVMbB-fRn8NiHJ78wEHjsJNLJKV55UQQAUMWhGvf9Z8_XDPMJZYglhqpLHynnGQ6GUdMCB4By6RLRk5FGikO0l0BNt9tNfpKZOGbWuT13Lm738o-SvZr0jNMGOZEOr0eezo67-DnzT6wC8Fn7Jpdl6ezNmNH3Uk7bOiVsdNuEwnlHWHxRX03gDbWWS7xMCdr8EwLKz9DBqEXOBmg2FLdw");'></div>
                            <span class="text-xs font-bold text-slate-700 dark:text-slate-300">Posted by ${event.sender_username}</span>
                        </div>
                        <button class="text-pink-600 text-sm font-bold flex items-center gap-1 group-hover:translate-x-1 transition-transform">
                            Read Details <span class="material-symbols-outlined text-[16px]">arrow_forward</span>
                        </button>
                    </div>
                </div>
            

            `;
            containerA.innerHTML += cardHTML;
            }
        });

    }
    catch(e){
        console.error("Failed to load announcements:", error);
        document.getElementById("insertAnnouncement").innerHTML = "<p>Failed to load events.</p>";
    }
    
}
</script>
</html>
