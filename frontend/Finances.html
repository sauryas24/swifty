<!DOCTYPE html>
<html class="light" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>SWIFTY Finances</title>
<script src="config.js"></script>
<script src="https://cdn.tailwindcss.com?plugins=forms,typography,container-queries"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>

<script>
    tailwind.config = {
        darkMode: "class",
        theme: {
            extend: {
                colors: {
                    primary: "#db2777", // Swifty Pink
                    "baby-pink": "#fdf2f8", // Original Background
                    "background-light": "#f8f6f7",
                    "background-dark": "#211119",
                    "text-main": "#171114",
                    "text-muted": "#876475",
                    "border-light": "#e5dce0",
                    "surface-dark": "#2d1b24",
                },
                fontFamily: {
                    sans: ["Inter", "sans-serif"],
                    display: ["Inter", "sans-serif"]
                },
                borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
            },
        },
    };
</script>

<style>
    body { font-family: "Inter", sans-serif; background-color: #fdf2f8; }
    
    :root {
            --bg-pink: #fdf2f8;
            --sidebar-width: 260px;
        }
        body {
            font-family: "Inter", sans-serif;
            background-color: var(--bg-pink);
        }
        
        /* Defines positioning for side navigation drawers to slide correctly when clicked. */
        .sidebar-drawer {
            transform: translateX(-100%);
            transition: transform 0.3s ease-in-out;
        }
        #sidebar-toggle:checked ~ .sidebar-drawer {
            transform: translateX(0);
        }
        #sidebar-toggle:checked ~ .main-content {
            margin-left: var(--sidebar-width);
        }
        .main-content {
            transition: margin-left 0.3s ease-in-out;
        }
        .watermark-bg {
            background-image: linear-gradient(to bottom right, rgba(251, 231, 239, 0.6), rgba(253, 242, 248, 0.9));
        }
        .dark .watermark-bg {
            background-image: linear-gradient(to bottom right, rgba(26, 16, 19, 0.95), rgba(45, 27, 34, 0.9));
        }
    .card-shadow { box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.05), 0 1px 2px 0 rgba(0, 0, 0, 0.03); }
</style>
</head>
<body class="bg-[#fdf2f8] text-slate-900 min-h-screen transition-colors duration-200">
<input checked class="hidden" id="sidebar-toggle" type="checkbox"/>
<header class="fixed top-0 left-0 right-0 h-16 bg-slate-900 text-white flex items-center px-6 z-[60] shadow-md border-b border-pink-900/20">
    <label id="menuBtn" class="p-2 mr-4 hover:bg-slate-800 rounded-lg cursor-pointer transition-colors" for="sidebar-toggle">
        <span class="material-icons-round text-2xl">menu</span>
    </label>
    <div class="flex items-center gap-4">
        <img src="swifty_logo.png" alt="Swifty Logo" class="h-16 object-contain drop-shadow-sm" />
        <span class="h-6 w-px bg-slate-700"></span>
        <span id="header-role-badge" class="text-lg text-pink-400 font-black uppercase tracking-wider bg-slate-800/80 px-4 py-1.5 rounded-lg shadow-inner">COORDINATOR</span>
    </div>
    <button id="logoutBtn" class="ml-auto flex items-center gap-2 bg-slate-800 hover:bg-slate-700 text-white rounded-lg px-4 py-2.5 text-sm font-semibold transition-colors shadow-sm">
        <span class="material-symbols-outlined text-[20px]">logout</span>
        <span>Logout</span>
    </button>
</header>

<div id="sidebar-container"></div>

<main class="main-content mt-16 min-h-screen overflow-y-auto p-4 md:p-8 relative watermark-bg">
        <div class="grid grid-cols-1 gap-8 max-w-[1400px] mx-auto relative z-10">
            <div class="w-full space-y-8">
                
                <div class="bg-white rounded-2xl p-8 border border-pink-100 dark:border-pink-900/20 shadow-sm">
                    <div class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-4">Club Budget Status</div>
                    <div class="flex items-baseline gap-4 mb-6">
                        <span id="spentAmount" class="text-4xl font-display font-bold text-slate-900">Loading...</span>
                        <span id="totalBudget" class="text-xl font-medium text-slate-400">/ Loading...</span>
                    </div>
                    <div class="relative w-full h-4 bg-pink-50 rounded-full overflow-hidden mb-3 border border-pink-100">
                        <div id="progressBar" class="absolute top-0 left-0 h-full bg-pink-500 rounded-full transition-all duration-1000" style="width: 0%"></div>
                    </div>
                    <p id="budgetUtilized" class="text-xs font-bold text-slate-500 uppercase tracking-tight">Loading utilization metrics...</p>
                </div>
                
                <div class="bg-white rounded-2xl border border-pink-100 dark:border-pink-900/20 shadow-sm overflow-hidden">
                    <div class="p-6 border-b border-pink-50 dark:border-pink-900/10 flex justify-between items-center">
                        <h3 class="font-display font-bold text-lg text-slate-800">Previous Bills and Receipts</h3>
                        <span class="material-symbols-outlined text-slate-400">receipt_long</span>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left">
                            <thead>
                                <tr class="text-[11px] font-bold text-slate-400 uppercase tracking-widest border-b border-pink-50 bg-pink-50/50">
                                    <th class="px-6 py-4">Date</th>
                                    <th class="px-6 py-4">Description</th>
                                    <th class="px-6 py-4 text-right">Amount (₹)</th>
                                    <th class="px-6 py-4 text-center">Receipt Link</th>
                                </tr>
                            </thead>
                            <tbody id="transactionsTable" class="divide-y divide-pink-50 dark:divide-pink-900/10">
                                <tr>
                                    <td colspan="4" class="px-6 py-8 text-center text-slate-500 text-sm font-medium flex flex-col items-center justify-center gap-2">
                                        <span class="material-symbols-outlined animate-spin text-pink-500">autorenew</span>
                                        Syncing financial ledgers...
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>

            </div>
        </div>
    </main>
</div>

<script>

    // --- NAVIGATION LOGIC (Event Delegation to match MOU) ---
    document.body.addEventListener("click", function(event) {
        const target = event.target.closest('a, button, li'); 
        if (!target) return;
        if (target.id === "logoutBtn") {
            event.preventDefault();
            localStorage.clear();
            window.location.replace("Select_role_login.html"); // Ensure exact case matches your actual filename
            return;
        }

        if (target.classList.contains("finances")) { event.preventDefault(); window.location.href = "Finances.html"; }
        else if (target.classList.contains("MOU_form")) { event.preventDefault(); window.location.href = "Mou.html"; }
        else if (target.classList.contains("venue_booking")) { event.preventDefault(); window.location.href = "Venue_booking.html"; }
        else if (target.classList.contains("permission_letter")) { event.preventDefault(); window.location.href = "permissionletter.html"; }
        else if (target.classList.contains("past_requests")) { event.preventDefault(); window.location.href = "past requests.html"; }
        else if (target.id === "dashboard") { event.preventDefault(); window.location.href = "Coordinator_homepage.html"; }
    });

    // --- DATA FETCHING LOGIC ---
    async function loadFinances() {
        try {
            const token = localStorage.getItem("token");
            if (!token) throw new Error("No authentication token found. Please log in.");

            const response = await fetch(`${API_BASE_URL}/api/finances/status`, {
                method: 'GET',
                headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' }
            });

            if (!response.ok) throw new Error("Failed to fetch finances");
            const data = await response.json();

            // Populate Budget UI
            document.getElementById("spentAmount").textContent = `₹${data.total_spent.toLocaleString('en-IN')}`;
            document.getElementById("totalBudget").textContent = `/ ₹${data.total_allocated.toLocaleString('en-IN')}`;
            
            const percent = data.utilization_percentage || 0;
            document.getElementById("progressBar").style.width = `${percent}%`;
            document.getElementById("budgetUtilized").textContent = `${percent}% of annual budget utilized`;

            // Populate Table
            const tableBody = document.getElementById("transactionsTable");
            
            if (!data.transactions || data.transactions.length === 0) {
                tableBody.innerHTML = `<tr><td colspan="4" class="text-center py-8 text-slate-400 font-medium">No transactions recorded yet.</td></tr>`;
                return;
            }

            let rowsHTML = "";
            data.transactions.forEach((tx) => {
                const dateObj = new Date(tx.timestamp || new Date()); 
                const formattedDate = dateObj.toLocaleDateString('en-US', { month: 'short', day: '2-digit', year: 'numeric' });
                
                const cleanUrl = tx.receipt_url.startsWith('/') ? tx.receipt_url.slice(1) : tx.receipt_url;
                // Ensures receipt links point to your backend correctly
                const baseUrl = typeof API_BASE_URL !== 'undefined' ? API_BASE_URL : 'http://127.0.0.1:8000';
                const fullUrl = `${cleanUrl}`;
                
                rowsHTML += `
                    <tr class="hover:bg-pink-50/30 transition-colors">
                        <td class="px-6 py-5 text-sm font-medium text-slate-500">${formattedDate}</td>
                        <td class="px-6 py-5 text-sm font-bold text-slate-800">${tx.description}</td>
                        <td class="px-6 py-5 text-sm font-black text-slate-900 text-right">₹${tx.amount.toLocaleString('en-IN')}</td>
                        <td class="px-6 py-5 text-center">
                            <button onclick="window.open('${fullUrl}', '_blank')" class="text-pink-600 hover:bg-pink-100 bg-pink-50 p-2 rounded-full transition-colors shadow-sm" title="View Receipt">
                                <span class="material-symbols-outlined text-[18px]">visibility</span>
                            </button>
                        </td>
                    </tr>
                `;
            });
            tableBody.innerHTML = rowsHTML;

        } catch (error) {
            console.error("Error loading finances:", error);
            document.getElementById("transactionsTable").innerHTML = `<tr><td colspan="4" class="text-center py-8 text-red-500 font-bold bg-red-50">Failed to load financial data. Check console for details.</td></tr>`;
        }
    }

    // Initialize fetching when the page loads
    loadFinances();
</script>
<script src="components/sidebar.js"></script>
</body>
</html>
