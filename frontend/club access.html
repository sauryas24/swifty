<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Club Access - SWIFTY</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,typography,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#db2777",
                        "baby-pink": "#fdf2f8",
                        "accent-pink": "#fce7f3",
                        "background-dark": "#1a1013",
                    },
                    fontFamily: {
                        display: ["Outfit", "Inter", "sans-serif"],
                        sans: ["Inter", "sans-serif"],
                    },
                    borderRadius: {
                        DEFAULT: "12px",
                    },
                },
            },
        };
    </script>
    <style type="text/tailwindcss">
        :root { --bg-pink: #fdf2f8; }
        body { font-family: "Inter", sans-serif; background-color: var(--bg-pink); }
        .watermark-bg {
            background-image: linear-gradient(to bottom right, rgba(251, 231, 239, 0.6), rgba(253, 242, 248, 0.9));
        }
        .dark .watermark-bg {
            background-image: linear-gradient(to bottom right, rgba(26, 16, 19, 0.95), rgba(45, 27, 34, 0.9));
        }
    </style>
</head>
<body class="bg-baby-pink dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen transition-colors duration-200 watermark-bg flex flex-col">

    <header class="fixed top-0 left-0 right-0 h-14 bg-slate-900 dark:bg-black text-white flex items-center justify-between px-6 z-[60] shadow-md border-b border-pink-900/20">
        <div class="flex items-center gap-2">
            <span class="font-display font-bold text-lg tracking-widest uppercase">SWIFTY</span>
        </div>
        <div class="flex items-center gap-4">
            <button class="text-slate-400 hover:text-pink-500 transition-colors" onclick="document.documentElement.classList.toggle('dark')">
                <span class="material-icons-round text-xl">dark_mode</span>
            </button>
            <a class="text-slate-400 text-xs font-bold uppercase tracking-wider flex items-center gap-1 hover:text-white transition-opacity" href="#">
                <span class="material-icons-round text-sm">arrow_back</span>
                Back
            </a>
        </div>
    </header>

    <main class="flex-1 flex items-center justify-center p-6 mt-14">
        <div class="w-full max-w-lg">
            <div class="bg-white dark:bg-slate-900 rounded-2xl shadow-sm p-8 md:p-12 border border-pink-100 dark:border-pink-900/20">
                <div class="text-center mb-10">
                    <h1 class="text-3xl md:text-4xl font-display font-black text-slate-900 dark:text-white mb-2 uppercase tracking-tight">Access Club</h1>
                    <p class="text-slate-500 dark:text-slate-400 text-sm">Verify your club credentials to enter dashboard</p>
                </div>
                <form class="space-y-6">
                    <div class="space-y-2">
    <label class="block text-[11px] font-bold tracking-widest text-slate-500 dark:text-slate-400 uppercase" for="affiliation">
        Club Affiliation
    </label>
    <div class="relative group">
        <select class="w-full bg-none bg-pink-50/50 dark:bg-slate-800 border-transparent focus:border-primary focus:ring-0 rounded-xl py-3 px-4 text-slate-900 dark:text-white appearance-none transition-all cursor-pointer font-medium text-sm" id="affiliation">
            <option disabled="" selected="" value="">Choose your club</option>
            <option value="music">Music Club</option>
            <option value="culinary">Culinary Club</option>
            <option value="dance">Dance Club</option>
            <option value="fine-arts">Fine Arts</option>
            <option value="photo">Photo Club</option>
        </select>
        <div class="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none flex items-center">
            <span class="material-icons-round text-slate-400 text-xl">expand_more</span>
        </div>
    </div>
</div>
                    <div class="space-y-2">
                        <label class="block text-[11px] font-bold tracking-widest text-slate-500 dark:text-slate-400 uppercase" for="password">
                            Club Password
                        </label>
                        <div class="relative">
                            <input class="w-full bg-pink-50/50 dark:bg-slate-800 border-transparent focus:border-primary focus:ring-0 rounded-xl py-3 px-4 text-slate-900 dark:text-white placeholder:text-slate-400 transition-all font-medium text-sm" id="password" placeholder="Enter Password" type="password"/>
                            <button class="absolute inset-y-0 right-0 flex items-center pr-4 text-slate-400 hover:text-pink-600 dark:hover:text-pink-400 transition-colors" type="button">
                                <span class="material-icons-round text-lg">visibility</span>
                            </button>
                        </div>
                    </div>
                    <div class="pt-4">
                        <button class="group w-full bg-slate-900 dark:bg-primary hover:bg-primary dark:hover:bg-pink-700 text-white font-display font-bold py-4 px-6 rounded-xl flex items-center justify-center gap-3 transition-all duration-300 transform active:scale-[0.98] uppercase text-sm tracking-wide shadow-lg shadow-slate-900/10" type="submit">
                            Continue to Dashboard
                            <span class="material-icons-round text-sm transition-transform group-hover:translate-x-1">arrow_forward</span>
                        </button>
                    </div>
                </form>
                <div class="mt-8 text-center">
                    <p class="text-xs text-slate-400 dark:text-slate-500 font-medium">
                        Need assistance? <a class="underline hover:text-primary transition-colors decoration-dashed" href="#">Contact Support</a>
                    </p>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
