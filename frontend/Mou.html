<!DOCTYPE html>
<html class="light" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>New MOU Request - SWIFTY</title>
<script src="config.js"></script>
<script>
    // Immediate Authentication Check: Prevent access without a token
    if (!localStorage.getItem("token")) {
        // Replace current history state so the user can't use the "Back" button to bypass this
        window.location.replace("Select_role_login.html");
    }
</script>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>

<script id="tailwind-config">
    tailwind.config = {
        darkMode: "class",
        theme: {
            extend: {
                colors: {
                    primary: "#db2777", // Swifty Pink
                    "baby-pink": "#fdf2f8", // Original Background
                    "background-light": "#f8f6f7",
                    "background-dark": "#211119",
                    "text-main": "#171114",
                    "text-muted": "#876475",
                    "border-light": "#e5dce0",
                    "surface-dark": "#2d1b24",
                },
                fontFamily: {
                    sans: ["Inter", "sans-serif"],
                    display: ["Inter", "sans-serif"]
                },
                borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
            },
        },
    }
</script>
<style type="text/tailwindcss">
    :root {
            --bg-pink: #fdf2f8;
            --sidebar-width: 260px;
        }
        body {
            font-family: "Inter", sans-serif;
            background-color: var(--bg-pink);
        }
        
        /* Defines positioning for side navigation drawers to slide correctly when clicked. */
        .sidebar-drawer {
            transform: translateX(-100%);
            transition: transform 0.3s ease-in-out;
        }
        #sidebar-toggle:checked ~ .sidebar-drawer {
            transform: translateX(0);
        }
        #sidebar-toggle:checked ~ .main-content {
            margin-left: var(--sidebar-width);
        }
        .main-content {
            transition: margin-left 0.3s ease-in-out;
        }
        .watermark-bg {
    background: linear-gradient(135deg, #fce7f3 0%, #f8fafc 40%, #e2e8f0 75%, #cbd5e1 100%);
    background-attachment: fixed;
}
.dark .watermark-bg {
    background: linear-gradient(135deg, #1a1013 0%, #0f172a 45%, #1e293b 100%);
    background-attachment: fixed;
}
    
    input[type="date"]::-webkit-calendar-picker-indicator {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        opacity: 0;
        cursor: pointer;
        z-index: 20;
    }
    
</style>
</head>
<body class="bg-[#fdf2f8] text-slate-900 min-h-screen transition-colors duration-200">
<input checked class="hidden" id="sidebar-toggle" type="checkbox"/>
<header class="fixed top-0 left-0 right-0 h-16 bg-slate-900 text-white flex items-center px-6 z-[60] shadow-md border-b border-pink-900/20">
        <label class="p-2 mr-4 hover:bg-slate-800 rounded-lg cursor-pointer transition-colors" for="sidebar-toggle">
    <span class="material-icons-round text-2xl">menu</span>
</label>
        <div class="flex items-center gap-4">
            <img src="swifty_logo.png" alt="Swifty Logo" class="h-16 object-contain drop-shadow-sm" />
            <span class="h-6 w-px bg-slate-700"></span>
            <span id="header-role-badge" class="text-lg text-pink-400 font-black uppercase tracking-wider bg-slate-800/80 px-4 py-1.5 rounded-lg shadow-inner">COORDINATOR</span>
        </div>
        <button id="logoutBtn" class="ml-auto flex items-center gap-2 bg-slate-800 hover:bg-slate-700 text-white rounded-lg px-4 py-2.5 text-sm font-semibold transition-colors shadow-sm">
            <span class="material-symbols-outlined text-[20px]">logout</span>
            <span>Logout</span>
        </button>
    </header>

    <div id="sidebar-container"></div>

    <main class="main-content mt-16 min-h-screen overflow-y-auto p-4 md:p-8 relative watermark-bg">
        <div class="max-w-4xl mx-auto relative z-10">
            <div class="bg-white dark:bg-slate-900 rounded-2xl p-6 md:p-10 shadow-sm border border-pink-100 dark:border-pink-900/20">
                
                <div class="mb-8 text-center border-b border-pink-50 dark:border-gray-800 pb-6">
                    <h2 class="text-slate-900 dark:text-white tracking-tight text-[28px] font-bold leading-tight">Memorandum of Understanding (MOU)</h2>
                </div>
                    
                    <form class="flex flex-col gap-6" id="mouForm">
                        <div class="flex flex-col w-full gap-2">
                            <label class="text-slate-900 dark:text-gray-200 text-sm font-medium">Collaborating Organization</label>
                            <input id="orgName" class="w-full rounded-xl text-slate-900 dark:text-white border border-pink-200 dark:border-gray-700 bg-white dark:bg-transparent h-14 px-4 text-base font-normal focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all placeholder:text-slate-400 dark:placeholder:text-gray-600" placeholder="Provide the partner organization's name" type="text" required/>
                        </div>

                        <div class="flex flex-col w-full gap-2">
                            <label class="text-slate-900 dark:text-gray-200 text-sm font-medium">Partnership Details & Scope</label>
                            <textarea id="purpose" class="w-full rounded-xl text-slate-900 dark:text-white border border-pink-200 dark:border-gray-700 bg-white dark:bg-transparent min-h-[140px] p-4 text-base font-normal focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all placeholder:text-slate-400 dark:placeholder:text-gray-600 resize-y" placeholder="Describe the deliverables, responsibilities, and terms of the agreement..." required></textarea>
                        </div>

                        <div class="flex flex-col gap-2">
                            <span class="text-slate-900 dark:text-gray-200 text-sm font-medium">Attach Files</span>
                            <div class="relative w-full border-2 border-dashed border-pink-200 dark:border-gray-700 rounded-xl bg-pink-50/50 dark:bg-white/5 hover:bg-white dark:hover:bg-white/10 transition-colors p-8 flex flex-col items-center justify-center gap-3 text-center cursor-pointer group">
                                <input id="docFile" class="absolute inset-0 opacity-0 cursor-pointer" type="file" accept=".pdf,.docx" required/>
                                <div class="size-12 rounded-full bg-white dark:bg-gray-800 shadow-sm flex items-center justify-center group-hover:scale-110 transition-transform">
                                    <span class="material-symbols-outlined text-primary text-[24px]">cloud_upload</span>
                                </div>
                                <div class="flex flex-col gap-1">
                                    <p class="text-slate-900 dark:text-white text-sm font-bold" id="fileNameDisplay">Click to upload or drag and drop</p>
                                    <p class="text-slate-500 dark:text-gray-500 text-xs">PDF, DOCX up to 10MB (Draft MOU, Proposals)</p>
                                </div>
                            </div>
                        </div>

                        <div class="pt-4 flex justify-end gap-3">
                            <button class="h-12 px-6 rounded-xl bg-transparent hover:bg-gray-100 dark:hover:bg-white/5 text-slate-500 dark:text-gray-300 font-medium transition-colors" type="button">
                                Cancel
                            </button>
                            <button id="submitBtn" class="h-12 px-8 rounded-xl bg-primary hover:bg-primary/90 text-white font-bold shadow-lg shadow-primary/20 transition-all flex items-center gap-2" type="button">
                                <span>Submit Request</span>
                                <span class="material-symbols-outlined text-lg">send</span>
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>
<script>

    // --- NAVIGATION LOGIC (Fixed using Event Delegation) ---
    // This ensures clicks work even if sidebar.js loads the HTML asynchronously
    document.body.addEventListener("click", function(event) {
        const target = event.target.closest('a, button, li'); // Adjust based on what your sidebar items are
        if (!target) return;
        if (target.id === "logoutBtn") {
            event.preventDefault();
            localStorage.clear();
            window.location.replace("Select_role_login.html"); // Ensure exact case matches your actual filename
            return;
        }

        if (target.classList.contains("finances")) { event.preventDefault(); window.location.href = "Finances.html"; }
        else if (target.classList.contains("MOU_form")) { event.preventDefault(); window.location.href = "Mou.html"; }
        else if (target.classList.contains("venue_booking")) { event.preventDefault(); window.location.href = "Venue_booking.html"; }
        else if (target.classList.contains("permission_letter")) { event.preventDefault(); window.location.href = "permissionletter.html"; }
        else if (target.classList.contains("past_requests")) { event.preventDefault(); window.location.href = "past requests.html"; }
        else if (target.id === "dashboard") { event.preventDefault(); window.location.href = "Coordinator_homepage.html"; }
    });

    // --- FILE UPLOAD & DRAG/DROP LOGIC ---
    const docFileInput = document.getElementById("docFile");
    const fileNameDisplay = document.getElementById("fileNameDisplay");
    const dropZone = docFileInput.closest('.border-dashed'); // Selects the container

    // 1. Handle normal click-to-upload
    docFileInput.addEventListener("change", function(e) {
        handleFiles(e.target.files);
    });

    // 2. Prevent default browser behavior for drag events
    ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
        dropZone.addEventListener(eventName, preventDefaults, false);
    });

    function preventDefaults(e) {
        e.preventDefault();
        e.stopPropagation();
    }

    // 3. Add visual styling when hovering with a file
    ['dragenter', 'dragover'].forEach(eventName => {
        dropZone.addEventListener(eventName, () => dropZone.classList.add('bg-pink-100', 'dark:bg-white/10'), false);
    });

    ['dragleave', 'drop'].forEach(eventName => {
        dropZone.addEventListener(eventName, () => dropZone.classList.remove('bg-pink-100', 'dark:bg-white/10'), false);
    });

    // 4. Handle the actual drop
    dropZone.addEventListener('drop', function(e) {
        const dt = e.dataTransfer;
        const files = dt.files;
        docFileInput.files = files; // Assign dropped files to the hidden input
        handleFiles(files);
    }, false);

    // Helper to update UI
    function handleFiles(files) {
        if(files.length > 0) {
            fileNameDisplay.textContent = files[0].name;
            fileNameDisplay.classList.add("text-primary"); 
        } else {
            fileNameDisplay.textContent = "Click to upload or drag and drop";
            fileNameDisplay.classList.remove("text-primary");
        }
    }

    // --- FORM SUBMISSION LOGIC ---
    const submitBtn = document.getElementById("submitBtn");
    submitBtn.addEventListener("click", async function(event) {
        event.preventDefault();

        const orgName = document.getElementById("orgName").value;
        const purpose = document.getElementById("purpose").value;
        const docFile = document.getElementById("docFile").files[0];

        if (!orgName || !purpose || !docFile) {
            alert("Please fill in all fields and attach a document.");
            return;
        }
        
        const freshToken = localStorage.getItem("token");
        if (!freshToken) {
            alert("Security Error: No token found. Please log in again.");
            return;
        }

        const formData = new FormData();
        formData.append("organization_name", orgName);
        formData.append("purpose", purpose);
        formData.append("document", docFile);

        const originalBtnHtml = submitBtn.innerHTML;
        submitBtn.disabled = true;
        submitBtn.innerHTML = `<span>Submitting...</span>`;

        try {
            // NOTE: Make sure API_BASE_URL is properly defined in your config.js
            const response = await fetch(`${API_BASE_URL}/api/mou/submit`, {
                method: "POST",
                headers: { "Authorization": `Bearer ${freshToken}` },
                body: formData // DO NOT set Content-Type header manually here; fetch does it automatically for FormData
            });

            const data = await response.json();

            if (response.ok) {
                alert("MoU Request submitted successfully!");
                document.getElementById("mouForm").reset(); 
                handleFiles([]); // Reset file display
            } else {
                alert(`Backend Error: ${data.detail || "Unauthorized"}`);
            }
        } catch (error) {
            console.error("Submission Error:", error);
            alert("A network error occurred. Please try again.");
        } finally {
            submitBtn.disabled = false;
            submitBtn.innerHTML = originalBtnHtml;
        }
    });

    // --- CANCEL BUTTON LOGIC ---
    const cancelBtn = document.querySelector('button[type="button"]:not(#submitBtn)');
    if (cancelBtn) {
        cancelBtn.addEventListener('click', () => {
            document.getElementById("mouForm").reset();
            handleFiles([]);
        });
    }
</script>
<script src="components/sidebar.js"></script>
</body>
</html>
