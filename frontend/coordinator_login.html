<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Coordinator Login - SWIFTY</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,typography,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#db2777",
                        "baby-pink": "#fdf2f8",
                        "accent-pink": "#fce7f3",
                        "background-dark": "#1a1013",
                    },
                    fontFamily: {
                        display: ["Outfit", "Inter", "sans-serif"],
                        sans: ["Inter", "sans-serif"],
                    },
                    borderRadius: {
                        DEFAULT: "12px",
                    },
                },
            },
        };
    </script>
    <style type="text/tailwindcss">
        :root { --bg-pink: #fdf2f8; }
        body { font-family: "Inter", sans-serif; background-color: var(--bg-pink); }
        .watermark-bg {
            background-image: linear-gradient(to bottom right, rgba(251, 231, 239, 0.6), rgba(253, 242, 248, 0.9));
        }
        .dark .watermark-bg {
            background-image: linear-gradient(to bottom right, rgba(26, 16, 19, 0.95), rgba(45, 27, 34, 0.9));
        }
    </style>
</head>
<body class="bg-baby-pink dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen transition-colors duration-200 watermark-bg flex flex-col">

    <header class="fixed top-0 left-0 right-0 h-14 bg-slate-900 dark:bg-black text-white flex items-center justify-between px-6 z-[60] shadow-md border-b border-pink-900/20">
        <div class="flex items-center gap-2">
            <span class="font-display font-bold text-lg tracking-widest uppercase">SWIFTY</span>
            <span class="text-xs text-pink-500 font-medium tracking-wide border-l border-slate-700 pl-2 ml-2">COORDINATOR</span>
        </div>
        <div class="flex items-center gap-4">
            <a id="goBack" class="flex items-center gap-2 text-xs font-bold text-slate-400 hover:text-white transition-colors uppercase tracking-wider" href="#">
                <span class="material-icons-round text-sm">calendar_today</span>
                Calendar
            </a>
            <button class="text-slate-400 hover:text-pink-500 transition-colors" onclick="document.documentElement.classList.toggle('dark')">
                <span class="material-icons-round text-xl">dark_mode</span>
            </button>
        </div>
    </header>

    <main class="flex-1 flex items-center justify-center p-6 mt-14">
        <div class="w-full max-w-lg bg-white dark:bg-slate-900 rounded-2xl shadow-sm border border-pink-100 dark:border-pink-900/20 p-10 md:p-14 text-center">
            <div class="flex justify-center mb-8">
                <div class="bg-pink-50 dark:bg-pink-900/30 p-4 rounded-full border border-pink-100 dark:border-pink-900/10">
                    <span class="material-icons-round text-primary text-4xl">lock_person</span>
                </div>
            </div>
            <h1 class="text-3xl md:text-4xl font-display font-black text-slate-900 dark:text-white mb-2 uppercase tracking-tight">Coordinator</h1>
            <p class="text-slate-500 dark:text-slate-400 text-sm mb-10 font-medium">Please verify your club credentials to proceed.</p>
            
            <div id="loginForm" class="space-y-6 text-left">
                <div class="space-y-2">
                    <label class="block text-[11px] font-bold tracking-widest text-slate-500 dark:text-slate-400 uppercase">
                        Club Affiliation
                    </label>
                    <div class="relative">
                        <select id="clubDrop" class="w-full bg-none h-12 bg-pink-50/50 dark:bg-slate-800 border-transparent focus:border-primary focus:ring-0 rounded-xl px-4 text-slate-800 dark:text-white appearance-none transition-all cursor-pointer font-medium text-sm">
                            <option disabled selected value="">Choose your club</option>
                            <option value="vanshikaag24@iitk.ac.in">Music Club (Test Email)</option>
                            <option value="dance@iitk.ac.in">Dance Club</option>
                            <option value="dramatics@iitk.ac.in">Dramatics Club</option>
                        </select>
                        <div class="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none flex items-center">
                            <span class="material-icons-round text-slate-400 text-xl">expand_more</span>
                        </div>
                    </div>
                </div>
                <div class="space-y-2">
                    <label class="block text-[11px] font-bold tracking-widest text-slate-500 dark:text-slate-400 uppercase">
                        Club Password
                    </label>
                    <div class="relative">
                        <input id="passwordEntered" class="w-full h-12 bg-pink-50/50 dark:bg-slate-800 border-transparent focus:border-primary focus:ring-0 rounded-xl px-4 placeholder-slate-400 text-slate-900 dark:text-white transition-all font-medium text-sm" placeholder="Enter Password" type="password"/>
                        <button id="visibilityToggle" class="material-icons-round absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-pink-600 dark:hover:text-pink-400" type="button">
                            visibility
                        </button>
                    </div>
                </div>
                <button id="loginButton" class="w-full bg-slate-900 dark:bg-primary text-white h-12 rounded-xl font-display font-bold text-sm uppercase tracking-wide flex items-center justify-center space-x-3 hover:bg-primary dark:hover:bg-pink-700 transition-all mt-8 shadow-lg shadow-slate-900/10" type="button">
                    <span>Continue to Dashboard</span>
                    <span class="material-icons-round text-sm">arrow_forward</span>
                </button>
            </div>
            
        </div>
    </main>
</body>
<script>
    // Navigation and UI Toggles
    const back = document.getElementById('goBack');
    if (back) {
        back.addEventListener("click", function(e) {
            e.preventDefault();
            window.location.href = "publiccalender.html";
        });
    }

    const passwordInput = document.getElementById('passwordEntered');
    const togglePassword = document.getElementById('visibilityToggle');
    if (togglePassword && passwordInput) {
        togglePassword.addEventListener('click', function () {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            this.textContent = type === 'password' ? 'visibility' : 'visibility_off';
        });
    }

    // THE LOUD LOGIN LOGIC
    const loginBtn = document.getElementById("loginButton");

    if (!loginBtn) {
        alert("CRITICAL UI ERROR: Could not find the login button!");
    } else {
        loginBtn.addEventListener("click", async (event) => {
            event.preventDefault();
            
            alert("STEP 1: Button clicked successfully!");

            const emailEl = document.getElementById("clubDrop");
            const passEl = document.getElementById("passwordEntered");

            if (!emailEl.value) {
                alert("STOPPING: You must select a club from the dropdown.");
                return;
            }
            if (!passEl.value) {
                alert("STOPPING: You must enter a password.");
                return;
            }

            const loginData = {
                email_id: emailEl.value,
                password: passEl.value
            };

            alert("STEP 2: Inputs grabbed. Contacting backend at 127.0.0.1:8000...");

            const originalText = loginBtn.innerHTML;
            loginBtn.innerHTML = `<span>Authenticating...</span><span class="material-icons-round animate-spin">refresh</span>`;
            loginBtn.disabled = true;

            try {
                // STEP 1: VERIFY PASSWORD
                const loginResponse = await fetch("http://127.0.0.1:8000/api/auth/login", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(loginData)
                });
                
                const loginResult = await loginResponse.json();
                
                // STEP 2: CHECK IF BACKEND REQUESTS OTP
                // We check for requires_2fa instead of the role!
                if (loginResponse.ok && loginResult.requires_2fa === true) {
                    
                    // Save ONLY the email for now so the OTP page knows who to verify
                    localStorage.setItem("userEmail", loginResult.email_id);

                    // The backend ALREADY sent the email (it told us in the message!)
                    // So we skip the background fetch and instantly redirect.
                    window.location.href = "./otp.html";

                } else {
                    // If password was wrong, it will hit this
                    alert("LOGIN REJECTED: " + (loginResult.detail || loginResult.message || "Invalid credentials"));
                    loginBtn.innerHTML = originalText;
                    loginBtn.disabled = false;
                }

            } catch (e) {
                alert("CRITICAL FETCH ERROR: Cannot reach backend.");
                loginBtn.innerHTML = originalText;
                loginBtn.disabled = false;
            }
        });
    }
</script>
</html>
